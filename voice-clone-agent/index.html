<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Clone Agent · XTTS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- React + Babel (no build step required) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #06090b; min-height: 100vh; }
    audio { accent-color: #f59e0b; }
    select, input, textarea { color-scheme: dark; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    @keyframes recPulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 7px #ef4444; }
      50%       { opacity: 0.3; transform: scale(0.75); box-shadow: 0 0 2px #ef4444; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    // ─────────────────────────────────────────────────────────────────────────
    // Text utilities
    // ─────────────────────────────────────────────────────────────────────────
    function chunkText(text, maxChars = 220) {
      const raw = text.replace(/\r\n/g, "\n").trim();
      const sentenceRe = /[^.!?…\n]+(?:[.!?…]+(?:["''"»]|\s|$)|\n|$)/g;
      const sentences = raw.match(sentenceRe) || [raw];
      const chunks = [];
      let cur = "";
      for (const s of sentences) {
        const t = s.trim();
        if (!t) continue;
        if (cur && cur.length + 1 + t.length > maxChars) { chunks.push(cur); cur = t; }
        else { cur = cur ? cur + " " + t : t; }
      }
      if (cur) chunks.push(cur);
      return chunks.filter(Boolean);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // WAV encoder / merger
    // ─────────────────────────────────────────────────────────────────────────
    function floatToWav(samples, sampleRate) {
      const len = samples.length;
      const buf = new ArrayBuffer(44 + len * 2);
      const view = new DataView(buf);
      const ws = (off, s) => [...s].forEach((c, i) => view.setUint8(off + i, c.charCodeAt(0)));
      ws(0, "RIFF"); view.setUint32(4, 36 + len * 2, true);
      ws(8, "WAVE"); ws(12, "fmt ");
      view.setUint32(16, 16, true); view.setUint16(20, 1, true);
      view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true);
      view.setUint16(34, 16, true); ws(36, "data"); view.setUint32(40, len * 2, true);
      let off = 44;
      for (let i = 0; i < len; i++) {
        const v = Math.max(-1, Math.min(1, samples[i]));
        view.setInt16(off, v < 0 ? v * 32768 : v * 32767, true);
        off += 2;
      }
      return new Blob([buf], { type: "audio/wav" });
    }

    async function mergeWavBlobs(blobs) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      const ctx = new Ctx();
      try {
        const decoded = await Promise.all(
          blobs.map(async (b) => ctx.decodeAudioData((await b.arrayBuffer()).slice(0)))
        );
        const sr = decoded[0].sampleRate;
        const total = decoded.reduce((s, b) => s + b.length, 0);
        const merged = new Float32Array(total);
        let off = 0;
        for (const d of decoded) { merged.set(d.getChannelData(0), off); off += d.length; }
        return floatToWav(merged, sr);
      } finally { await ctx.close(); }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Constants
    // ─────────────────────────────────────────────────────────────────────────
    const LANGS = [
      ["en","English"],["hi","Hindi"],["es","Spanish"],["fr","French"],
      ["de","German"],["pt","Portuguese"],["zh-cn","Mandarin"],["ja","Japanese"],
      ["ko","Korean"],["ar","Arabic"],["it","Italian"],["ru","Russian"],["nl","Dutch"],
    ];

    const C = {
      bg: "#06090b",
      surface: "rgba(255,255,255,0.025)",
      border: "rgba(255,255,255,0.07)",
      borderHi: "rgba(245,158,11,0.35)",
      amber: "#f59e0b",
      amberDim: "rgba(245,158,11,0.12)",
      green: "#10b981",
      greenDim: "rgba(16,185,129,0.1)",
      red: "#ef4444",
      redDim: "rgba(239,68,68,0.1)",
      blue: "#60a5fa",
      blueDim: "rgba(96,165,250,0.1)",
      textPrimary: "#e2e8ec",
      textMuted: "#9ca3af",
      textDim: "#4b5563",
      mono: "'DM Mono','Courier New',monospace",
      sans: "'Syne',system-ui,sans-serif",
    };

    // ─────────────────────────────────────────────────────────────────────────
    // Live Waveform Canvas
    // ─────────────────────────────────────────────────────────────────────────
    function WaveformCanvas({ analyser, active }) {
      const canvasRef = useRef();
      const rafRef    = useRef();

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const W = canvas.width, H = canvas.height;

        const draw = () => {
          rafRef.current = requestAnimationFrame(draw);
          ctx.clearRect(0, 0, W, H);

          if (!analyser || !active) {
            ctx.beginPath();
            ctx.strokeStyle = "rgba(255,255,255,0.07)";
            ctx.lineWidth = 1.5;
            ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2);
            ctx.stroke();
            ctx.fillStyle = "rgba(255,255,255,0.11)";
            ctx.font = "10px 'DM Mono', monospace";
            ctx.textAlign = "center";
            ctx.fillText("WAVEFORM APPEARS WHEN RECORDING", W / 2, H / 2 - 8);
            return;
          }

          const bufLen = analyser.frequencyBinCount;
          const data   = new Uint8Array(bufLen);
          analyser.getByteTimeDomainData(data);

          ctx.beginPath();
          const sliceW = W / bufLen;
          let x = 0;
          for (let i = 0; i < bufLen; i++) {
            const v = data[i] / 128.0;
            const y = (v * H) / 2;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            x += sliceW;
          }
          ctx.lineTo(W, H / 2);

          const grad = ctx.createLinearGradient(0, 0, W, 0);
          grad.addColorStop(0,   "rgba(239,68,68,0.5)");
          grad.addColorStop(0.5, "#ef4444");
          grad.addColorStop(1,   "rgba(239,68,68,0.5)");
          ctx.strokeStyle = grad;
          ctx.lineWidth   = 2;
          ctx.shadowBlur  = 10;
          ctx.shadowColor = "#ef444488";
          ctx.stroke();
          ctx.shadowBlur  = 0;
        };

        draw();
        return () => cancelAnimationFrame(rafRef.current);
      }, [analyser, active]);

      return (
        <canvas ref={canvasRef} width={640} height={72}
          style={{ width: "100%", height: 72, borderRadius: 8, display: "block" }} />
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Timer
    // ─────────────────────────────────────────────────────────────────────────
    function Timer({ seconds }) {
      const m = String(Math.floor(seconds / 60)).padStart(2, "0");
      const s = String(seconds % 60).padStart(2, "0");
      return <span style={{ fontFamily: C.mono, fontSize: 22, color: C.red, letterSpacing: "0.12em" }}>{m}:{s}</span>;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Shared UI
    // ─────────────────────────────────────────────────────────────────────────
    function Card({ children, style }) {
      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 14, padding: 24, marginBottom: 14, ...style }}>
          {children}
        </div>
      );
    }

    function StepHeader({ num, title, right }) {
      return (
        <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 18 }}>
          <span style={{ fontSize: 10, color: C.amber, letterSpacing: "0.25em", fontFamily: C.mono, fontWeight: 700 }}>{num}</span>
          <span style={{ fontSize: 15, fontWeight: 700, color: "#fff", fontFamily: C.sans }}>{title}</span>
          {right && <span style={{ marginLeft: "auto", fontSize: 10, color: C.textDim, fontFamily: C.mono }}>{right}</span>}
        </div>
      );
    }

    function Badge({ ok, warn, children }) {
      const col = ok ? C.green : warn ? C.amber : C.red;
      const bg  = ok ? C.greenDim : warn ? C.amberDim : C.redDim;
      return (
        <div style={{ marginTop: 12, padding: "10px 14px", borderRadius: 8, fontSize: 11, background: bg, border: `1px solid ${col}44`, color: col, fontFamily: C.mono, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>
          {children}
        </div>
      );
    }

    function Btn({ onClick, disabled, children, color = "amber", full = true, mt = 12 }) {
      const col = { green: C.green, red: C.red, blue: C.blue, amber: C.amber }[color] || C.amber;
      const dim = { green: C.greenDim, red: C.redDim, blue: C.blueDim, amber: C.amberDim }[color] || C.amberDim;
      return (
        <button onClick={onClick} disabled={disabled} style={{
          width: full ? "100%" : "auto", marginTop: mt,
          background: disabled ? "rgba(255,255,255,0.03)" : dim,
          border: `1px solid ${disabled ? "rgba(255,255,255,0.07)" : col + "55"}`,
          borderRadius: 10, padding: "13px 20px",
          color: disabled ? C.textDim : col,
          fontSize: 12, fontWeight: 600, letterSpacing: "0.07em",
          fontFamily: C.mono, cursor: disabled ? "not-allowed" : "pointer",
          transition: "all 0.15s",
        }}>
          {children}
        </button>
      );
    }

    function Input({ value, onChange, placeholder, style }) {
      return (
        <input value={value} onChange={onChange} placeholder={placeholder} style={{
          background: "rgba(0,0,0,0.35)", border: `1px solid ${C.border}`,
          borderRadius: 8, padding: "9px 13px", color: C.textPrimary,
          fontSize: 12, fontFamily: C.mono, outline: "none", ...style,
        }} />
      );
    }

    function ProgressBar({ n, total }) {
      const pct = total > 0 ? (n / total) * 100 : 0;
      return (
        <div style={{ marginTop: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: C.textMuted, marginBottom: 5, fontFamily: C.mono }}>
            <span>GENERATING</span><span>{n} / {total}</span>
          </div>
          <div style={{ height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 2, overflow: "hidden" }}>
            <div style={{ height: "100%", borderRadius: 2, background: `linear-gradient(90deg, ${C.green}, #34d399)`, width: `${pct}%`, transition: "width 0.25s ease" }} />
          </div>
        </div>
      );
    }

    function TabBtn({ active, onClick, icon, children }) {
      return (
        <button onClick={onClick} style={{
          flex: 1, padding: "11px 0", fontFamily: C.mono, fontSize: 11,
          letterSpacing: "0.12em", fontWeight: 600, cursor: "pointer",
          background: active ? C.amberDim : "transparent",
          color: active ? C.amber : C.textDim,
          border: "none",
          borderBottom: `2px solid ${active ? C.amber : "rgba(255,255,255,0.04)"}`,
          transition: "all 0.18s",
          display: "flex", alignItems: "center", justifyContent: "center", gap: 7,
        }}>
          <span>{icon}</span>{children}
        </button>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Main App
    // ─────────────────────────────────────────────────────────────────────────
    const MAX_REC_SEC = 120;

    function App() {
      const [serverUrl, setServerUrl] = useState("http://localhost:8020");
      const [cfgOpen, setCfgOpen]     = useState(false);
      const [connSt, setConnSt]       = useState(null); // null|testing|ok|cors|fail

      // ── Diagnose fetch errors ─────────────────────────────────────────────
      const diagnoseFetchError = (e, label) => {
        const msg = (e?.message || "").toLowerCase();
        if (msg.includes("failed to fetch") || msg.includes("networkerror") || msg.includes("connection refused") || msg === "") {
          return `Server not running at ${serverUrl}\n→ In Terminal: xtts-api-server --cors --port 8020`;
        }
        if (msg.includes("cors") || msg.includes("cross-origin") || msg.includes("blocked")) {
          return `CORS blocked — server is up but missing --cors flag\n→ Restart: xtts-api-server --cors --port 8020`;
        }
        if (msg.includes("timeout") || msg.includes("abort")) {
          return `Timed out — XTTS model may still be loading (first run takes 2–5 min). Wait and retry.`;
        }
        return `${label}: ${e?.message || "Unknown error"}`;
      };

      // ── Ping helper (auto-runs on mount) ─────────────────────────────────
      const pingServer = useCallback(async (url) => {
        setConnSt("testing");
        try {
          const r = await fetch(`${url}/speakers`, { signal: AbortSignal.timeout(4000) });
          setConnSt(r.ok ? "ok" : "fail");
        } catch (e) {
          const msg = (e?.message || "").toLowerCase();
          setConnSt(msg.includes("cors") ? "cors" : "fail");
        }
      }, []);

      useEffect(() => { pingServer(serverUrl); }, []);

      const [sourceTab, setSourceTab] = useState("upload");

      const [refFile, setRefFile]     = useState(null);
      const [refUrl, setRefUrl]       = useState(null);
      const [refSource, setRefSource] = useState(null);
      const [dragOver, setDragOver]   = useState(false);
      const fileInputRef = useRef();

      const [recSt, setRecSt]           = useState("idle");
      const [recSeconds, setRecSeconds] = useState(0);
      const [recError, setRecError]     = useState("");
      const [analyser, setAnalyser]     = useState(null);
      const mediaRecRef  = useRef(null);
      const chunksRef    = useRef([]);
      const timerRef     = useRef(null);
      const streamRef    = useRef(null);
      const audioCtxRef  = useRef(null);

      const [speakerName, setSpeakerName] = useState(null);
      const [manualName, setManualName]   = useState("");
      const [useManual, setUseManual]     = useState(false);
      const [cloneSt, setCloneSt]         = useState("idle");
      const [cloneError, setCloneError]   = useState("");

      const [script, setScript]       = useState("");
      const [lang, setLang]           = useState("en");
      const [maxChunk, setMaxChunk]   = useState(220);
      const [silenceMs, setSilenceMs] = useState(300);
      const [genSt, setGenSt]         = useState("idle");
      const [progress, setProgress]   = useState({ n: 0, total: 0 });
      const [log, setLog]             = useState([]);
      const [genError, setGenError]   = useState("");
      const [outUrl, setOutUrl]       = useState(null);
      const [outBlob, setOutBlob]     = useState(null);
      const abortRef = useRef(false);

      const activeSpeaker = useManual ? manualName.trim() : speakerName;

      useEffect(() => () => { stopMicStream(); clearInterval(timerRef.current); }, []);

      useEffect(() => {
        if (recSeconds >= MAX_REC_SEC && recSt === "recording") stopRecording();
      }, [recSeconds, recSt]);

      const resetClone = () => {
        setSpeakerName(null); setCloneSt("idle"); setCloneError("");
        setOutUrl(null); setOutBlob(null); setGenSt("idle");
      };

      const loadFile = useCallback((file) => {
        if (!file) return;
        setRefFile(file); setRefUrl(URL.createObjectURL(file)); setRefSource("upload");
        resetClone();
      }, []);

      const stopMicStream = () => {
        streamRef.current?.getTracks().forEach(t => t.stop());
        audioCtxRef.current?.close().catch(() => {});
        streamRef.current = null; audioCtxRef.current = null; setAnalyser(null);
      };

      const startRecording = async () => {
        setRecSt("requesting"); setRecError("");
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          streamRef.current = stream;

          const Ctx = window.AudioContext || window.webkitAudioContext;
          const actx = new Ctx();
          audioCtxRef.current = actx;
          const src = actx.createMediaStreamSource(stream);
          const an  = actx.createAnalyser();
          an.fftSize = 1024; an.smoothingTimeConstant = 0.8;
          src.connect(an);
          setAnalyser(an);

          const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
            ? "audio/webm;codecs=opus" : "audio/webm";
          const mr = new MediaRecorder(stream, { mimeType });
          mediaRecRef.current = mr;
          chunksRef.current   = [];

          mr.ondataavailable = (e) => { if (e.data.size > 0) chunksRef.current.push(e.data); };
          mr.onstop = async () => {
            stopMicStream();
            clearInterval(timerRef.current);
            const blob  = new Blob(chunksRef.current, { type: "audio/webm" });
            const fname = `recording_${new Date().toISOString().slice(0,19).replace(/[:T]/g,"-")}.webm`;
            const file  = new File([blob], fname, { type: "audio/webm" });
            setRefFile(file); setRefUrl(URL.createObjectURL(blob)); setRefSource("record");
            resetClone(); setRecSt("stopped");
          };

          mr.start(200);
          setRecSt("recording"); setRecSeconds(0);
          timerRef.current = setInterval(() => setRecSeconds(s => s + 1), 1000);

        } catch (e) {
          stopMicStream(); setRecSt("error");
          setRecError(
            e.name === "NotAllowedError"
              ? "Mic access denied. In Chrome: click the 🔒 icon in the address bar → allow microphone → reload."
              : e.name === "NotFoundError"
              ? "No microphone detected. Connect a mic and retry."
              : e.message
          );
        }
      };

      const stopRecording = () => {
        clearInterval(timerRef.current);
        if (mediaRecRef.current?.state === "recording") mediaRecRef.current.stop();
      };

      const discardRecording = () => {
        setRecSt("idle"); setRecSeconds(0);
        setRefFile(null); setRefUrl(null); setRefSource(null);
        resetClone();
      };

      const cloneSpeaker = async () => {
        if (!refFile) return;
        if (connSt !== "ok") {
          setCloneSt("error");
          setCloneError(`Server offline — start it first:\n  xtts-api-server --cors --port 8020`);
          return;
        }
        setCloneSt("cloning"); setCloneError("");
        try {
          const fd = new FormData(); fd.append("wav_file", refFile);
          const r  = await fetch(`${serverUrl}/clone_speaker`, { method: "POST", body: fd });
          if (!r.ok) { const txt = await r.text().catch(() => ""); throw new Error(`HTTP ${r.status}${txt ? ": " + txt.slice(0,120) : ""}`); }
          const d = await r.json();
          setSpeakerName(d.speaker_name || d.name || "cloned_voice");
          setCloneSt("cloned");
          pingServer(serverUrl); // refresh status after use
        } catch (e) {
          setCloneSt("error");
          setCloneError(diagnoseFetchError(e, "/clone_speaker"));
        }
      };

      const generate = async () => {
        if (!activeSpeaker || !script.trim()) return;
        if (connSt !== "ok") {
          setGenSt("error");
          setGenError(`Server offline — start it first:\n  xtts-api-server --cors --port 8020`);
          return;
        }
        const chunks = chunkText(script, maxChunk);
        abortRef.current = false;
        setGenSt("running"); setProgress({ n: 0, total: chunks.length });
        setLog([]); setOutUrl(null); setOutBlob(null); setGenError("");

        const blobs = [];
        let silenceBlob = null;
        if (silenceMs > 0) silenceBlob = floatToWav(new Float32Array(Math.floor((silenceMs / 1000) * 22050)), 22050);

        for (let i = 0; i < chunks.length; i++) {
          if (abortRef.current) { setGenSt("idle"); return; }
          setProgress({ n: i + 1, total: chunks.length });
          setLog(p => [...p, { i, text: chunks[i].length > 65 ? chunks[i].slice(0,62) + "…" : chunks[i], st: "running" }]);
          try {
            const r = await fetch(`${serverUrl}/tts_to_audio`, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text: chunks[i], speaker_name: activeSpeaker, language: lang }),
            });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            blobs.push(await r.blob());
            if (silenceBlob && i < chunks.length - 1) blobs.push(silenceBlob);
            setLog(p => p.map((c, j) => j === i ? { ...c, st: "done" } : c));
          } catch (e) {
            setLog(p => p.map((c, j) => j === i ? { ...c, st: "error" } : c));
            setGenSt("error");
            setGenError(diagnoseFetchError(e, `Chunk ${i+1}/${chunks.length}`));
            pingServer(serverUrl); // re-check server after failure
            return;
          }
        }

        try {
          const out = blobs.length === 1 ? blobs[0] : await mergeWavBlobs(blobs);
          setOutBlob(out); setOutUrl(URL.createObjectURL(out)); setGenSt("done");
        } catch (e) { setGenSt("error"); setGenError(`Merge failed: ${e.message}`); }
      };

      const stopGen = () => { abortRef.current = true; };

      const chunks    = script.trim() ? chunkText(script, maxChunk) : [];
      const wordCount = script.trim() ? script.trim().split(/\s+/).length : 0;
      const estSecs   = Math.round(wordCount * 0.35);
      const canClone    = refFile && cloneSt !== "cloning";
      const canGenerate = activeSpeaker && script.trim() && genSt !== "running";
      const nearLimit   = recSt === "recording" && recSeconds >= MAX_REC_SEC - 10;

      return (
        <div style={{ minHeight: "100vh", background: C.bg, color: C.textPrimary, fontFamily: C.mono, fontSize: 13 }}>
          <div style={{ position: "fixed", inset: 0, pointerEvents: "none", background: "radial-gradient(ellipse 70% 40% at 50% -10%, rgba(245,158,11,0.07) 0%, transparent 55%)" }} />

          <div style={{ position: "relative", maxWidth: 740, margin: "0 auto", padding: "36px 20px 80px" }}>

            {/* Header */}
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 36 }}>
              <div>
                <div style={{ fontSize: 10, color: C.amber, letterSpacing: "0.3em", marginBottom: 6 }}>COQUI XTTS · PODCAST DUBBING</div>
                <h1 style={{ margin: 0, fontSize: 26, fontWeight: 700, color: "#fff", fontFamily: C.sans, letterSpacing: "-0.3px" }}>Voice Clone Agent</h1>
                <p style={{ margin: "6px 0 0", fontSize: 11, color: C.textMuted, lineHeight: 1.5 }}>
                  Upload or record a voice sample → clone speaker → generate dubbed audio
                </p>
              </div>
              <button onClick={() => setCfgOpen(p => !p)} style={{
                background: cfgOpen ? C.amberDim : "transparent",
                border: `1px solid ${cfgOpen ? C.borderHi : C.border}`,
                borderRadius: 8, color: cfgOpen ? C.amber : C.textMuted,
                padding: "7px 14px", cursor: "pointer", fontSize: 11, fontFamily: C.mono, letterSpacing: "0.1em",
              }}>⚙ CONFIG</button>
            </div>

            {/* Persistent server status banner */}
            {connSt !== "ok" && (
              <div style={{
                marginBottom: 14, padding: "12px 16px", borderRadius: 10,
                background: connSt === "testing" ? "rgba(255,255,255,0.03)" : connSt === "cors" ? C.amberDim : C.redDim,
                border: `1px solid ${connSt === "testing" ? C.border : connSt === "cors" ? C.amber + "44" : C.red + "44"}`,
                display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12,
              }}>
                <div>
                  <div style={{ fontSize: 11, fontWeight: 600, color: connSt === "testing" ? C.textMuted : connSt === "cors" ? C.amber : C.red, fontFamily: C.mono, marginBottom: 5 }}>
                    {connSt === "testing" && "⟳  CHECKING SERVER…"}
                    {connSt === "cors"    && "⚠  CORS BLOCKED — SERVER IS UP BUT MISSING --cors FLAG"}
                    {connSt === "fail"    && "✗  XTTS SERVER NOT RUNNING"}
                    {connSt === null      && "⟳  CHECKING SERVER…"}
                  </div>
                  {(connSt === "fail" || connSt === "cors") && (
                    <div style={{ fontSize: 10, color: C.textMuted, fontFamily: C.mono, lineHeight: 1.9 }}>
                      {connSt === "fail" && <><span>Open Terminal and run:</span><br /></>}
                      {connSt === "cors" && <><span>Stop the server and restart with:</span><br /></>}
                      <span style={{ color: C.amber, userSelect: "all" }}>xtts-api-server --cors --port 8020</span>
                      {connSt === "fail" && (
                        <><br /><span style={{ color: C.textDim }}>First run downloads ~1.8 GB model — wait 2–5 min</span></>
                      )}
                    </div>
                  )}
                </div>
                {(connSt === "fail" || connSt === "cors") && (
                  <button onClick={() => pingServer(serverUrl)} style={{
                    background: "rgba(255,255,255,0.05)", border: `1px solid ${C.border}`,
                    borderRadius: 7, padding: "7px 12px", color: C.textMuted,
                    fontSize: 10, fontFamily: C.mono, cursor: "pointer", whiteSpace: "nowrap",
                  }}>↺ RETRY</button>
                )}
              </div>
            )}
            {connSt === "ok" && (
              <div style={{ marginBottom: 14, padding: "10px 16px", borderRadius: 10, background: C.greenDim, border: `1px solid ${C.green}33`, fontSize: 11, color: C.green, fontFamily: C.mono, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span>✓  SERVER ONLINE — {serverUrl}</span>
                <button onClick={() => pingServer(serverUrl)} style={{ background: "none", border: "none", color: C.textDim, fontSize: 10, fontFamily: C.mono, cursor: "pointer" }}>↺</button>
              </div>
            )}

            {/* Config */}
            {cfgOpen && (
              <Card style={{ borderColor: C.borderHi, background: "rgba(245,158,11,0.04)" }}>
                <div style={{ fontSize: 10, color: C.amber, letterSpacing: "0.2em", marginBottom: 12 }}>SERVER CONFIGURATION</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <Input value={serverUrl} onChange={e => setServerUrl(e.target.value)} placeholder="http://localhost:8020" style={{ flex: 1 }} />
                  <button onClick={() => pingServer(serverUrl)} style={{ background: C.greenDim, border: `1px solid ${C.green}44`, borderRadius: 8, color: C.green, padding: "9px 14px", cursor: "pointer", fontSize: 11, fontFamily: C.mono }}>PING</button>
                </div>
                {connSt === "ok"   && <Badge ok>✓ Server reachable</Badge>}
                {connSt === "fail" && <Badge>✗ Cannot reach — run: xtts-api-server --cors --port 8020</Badge>}
                <div style={{ marginTop: 14, padding: "10px 14px", background: "rgba(0,0,0,0.25)", borderRadius: 8, fontSize: 10, color: C.textDim, lineHeight: 1.9 }}>
                  <div style={{ color: C.textMuted, marginBottom: 4 }}>QUICK START</div>
                  <div>pip install xtts-api-server</div>
                  <div>xtts-api-server --cors --port 8020</div>
                  <div style={{ color: C.amber, marginTop: 4 }}>First run downloads ~1.8 GB XTTS v2 model</div>
                </div>
              </Card>
            )}

            {/* ── STEP 01 ── */}
            <Card>
              <StepHeader num="01" title="Reference Voice" right="6–30s of clean speech" />

              <div style={{ display: "flex", borderBottom: `1px solid ${C.border}`, marginBottom: 22 }}>
                <TabBtn active={sourceTab === "upload"} onClick={() => setSourceTab("upload")} icon="⬆">UPLOAD FILE</TabBtn>
                <TabBtn active={sourceTab === "record"} onClick={() => setSourceTab("record")} icon="⏺">RECORD MIC</TabBtn>
              </div>

              {/* Upload */}
              {sourceTab === "upload" && (
                <>
                  <div
                    onClick={() => fileInputRef.current?.click()}
                    onDrop={e => { e.preventDefault(); setDragOver(false); loadFile(e.dataTransfer.files[0]); }}
                    onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                    onDragLeave={() => setDragOver(false)}
                    style={{
                      border: `2px dashed ${dragOver ? C.amber : refFile && refSource === "upload" ? C.green : "rgba(255,255,255,0.1)"}`,
                      borderRadius: 10, padding: "28px 20px", textAlign: "center", cursor: "pointer",
                      background: dragOver ? C.amberDim : refFile && refSource === "upload" ? C.greenDim : "rgba(0,0,0,0.15)",
                      transition: "all 0.2s",
                    }}>
                    <input ref={fileInputRef} type="file" accept="audio/*" style={{ display: "none" }} onChange={e => loadFile(e.target.files[0])} />
                    {refFile && refSource === "upload" ? (
                      <>
                        <div style={{ fontSize: 22, marginBottom: 6 }}>🎙</div>
                        <div style={{ color: C.green, fontSize: 12 }}>{refFile.name}</div>
                        <div style={{ fontSize: 10, color: C.textDim, marginTop: 3 }}>{(refFile.size / 1024).toFixed(0)} KB · click to replace</div>
                      </>
                    ) : (
                      <>
                        <div style={{ fontSize: 30, opacity: 0.25, marginBottom: 10 }}>🎤</div>
                        <div style={{ color: C.textMuted, fontSize: 12 }}>Drop audio here or click to browse</div>
                        <div style={{ color: C.textDim, fontSize: 10, marginTop: 5 }}>WAV · MP3 · FLAC · M4A · OGG</div>
                      </>
                    )}
                  </div>
                  {refUrl && refSource === "upload" && (
                    <audio src={refUrl} controls style={{ width: "100%", marginTop: 12, borderRadius: 8, height: 36 }} />
                  )}
                </>
              )}

              {/* Record */}
              {sourceTab === "record" && (
                <div>
                  <div style={{
                    background: "rgba(0,0,0,0.4)",
                    border: `1px solid ${recSt === "recording" ? C.red + "55" : C.border}`,
                    borderRadius: 12, padding: "16px 18px", transition: "border-color 0.3s",
                  }}>
                    <WaveformCanvas analyser={analyser} active={recSt === "recording"} />

                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        {recSt === "recording" && (
                          <>
                            <span style={{ width: 9, height: 9, borderRadius: "50%", background: C.red, display: "inline-block", animation: "recPulse 1.1s ease-in-out infinite" }} />
                            <span style={{ fontSize: 10, color: C.red, letterSpacing: "0.18em" }}>LIVE</span>
                          </>
                        )}
                        {recSt === "idle"       && <span style={{ fontSize: 10, color: C.textDim }}>— READY —</span>}
                        {recSt === "requesting" && <span style={{ fontSize: 10, color: C.amber }}>REQUESTING MIC…</span>}
                        {recSt === "stopped"    && <span style={{ fontSize: 10, color: C.green }}>✓ SAVED</span>}
                      </div>
                      {(recSt === "recording" || recSt === "stopped") && <Timer seconds={recSeconds} />}
                    </div>

                    {nearLimit && (
                      <div style={{ fontSize: 10, color: C.amber, marginTop: 8 }}>
                        ⚠ Auto-stopping in {MAX_REC_SEC - recSeconds}s
                      </div>
                    )}
                  </div>

                  {recSt === "error" && <Badge>{recError}</Badge>}

                  <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                    {(recSt === "idle" || recSt === "error") && (
                      <Btn onClick={startRecording} color="red" mt={0}>⏺  START RECORDING</Btn>
                    )}
                    {recSt === "requesting" && <Btn disabled color="red" mt={0}>REQUESTING MIC…</Btn>}
                    {recSt === "recording"  && <Btn onClick={stopRecording} color="amber" mt={0}>■  STOP &amp; SAVE</Btn>}
                    {recSt === "stopped" && (
                      <>
                        <button onClick={discardRecording} style={{ flex: 1, padding: "13px 0", background: "rgba(255,255,255,0.03)", border: `1px solid ${C.border}`, borderRadius: 10, color: C.textMuted, fontSize: 12, fontFamily: C.mono, cursor: "pointer" }}>↺ DISCARD</button>
                        <button onClick={startRecording} style={{ flex: 2, padding: "13px 0", background: C.redDim, border: `1px solid ${C.red}55`, borderRadius: 10, color: C.red, fontSize: 12, fontFamily: C.mono, cursor: "pointer" }}>⏺ NEW TAKE</button>
                      </>
                    )}
                  </div>

                  {refUrl && refSource === "record" && recSt === "stopped" && (
                    <div style={{ marginTop: 14, padding: "14px 16px", background: "rgba(0,0,0,0.25)", borderRadius: 10, border: `1px solid ${C.green}33` }}>
                      <div style={{ fontSize: 10, color: C.green, letterSpacing: "0.15em", marginBottom: 8 }}>
                        RECORDED · {recSeconds}s · {refFile ? (refFile.size / 1024).toFixed(0) + " KB" : ""}
                      </div>
                      <audio src={refUrl} controls style={{ width: "100%", borderRadius: 8, height: 36 }} />
                    </div>
                  )}

                  {(recSt === "idle" || recSt === "error") && (
                    <div style={{ marginTop: 14, padding: "12px 14px", background: "rgba(0,0,0,0.18)", borderRadius: 8, fontSize: 10, color: C.textDim, lineHeight: 2 }}>
                      <span style={{ color: C.textMuted }}>RECORDING TIPS</span><br />
                      · Quiet room with minimal echo<br />
                      · 10–30 seconds of natural speech<br />
                      · Normal pace — no rushing or whispering<br />
                      · Keep mic 10–20 cm from mouth
                    </div>
                  )}
                </div>
              )}

              {/* Clone controls */}
              <div style={{ marginTop: 20, paddingTop: 18, borderTop: `1px solid ${C.border}` }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, flexWrap: "wrap" }}>
                  <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: C.textMuted, cursor: "pointer", whiteSpace: "nowrap" }}>
                    <input type="checkbox" checked={useManual} onChange={e => setUseManual(e.target.checked)} style={{ accentColor: C.amber }} />
                    Use existing speaker name
                  </label>
                  {useManual && (
                    <Input value={manualName} onChange={e => setManualName(e.target.value)}
                      placeholder="e.g. wav_voice_abc123" style={{ flex: 1, minWidth: 160, fontSize: 11 }} />
                  )}
                </div>
                {!useManual && (
                  <Btn onClick={cloneSpeaker} disabled={!canClone} mt={0}>
                    {cloneSt === "cloning" ? "⟳  CLONING VOICE…" : "→  CLONE SPEAKER"}
                  </Btn>
                )}
                {cloneSt === "cloned" && !useManual && <Badge ok>✓ Speaker cloned · ID: {speakerName}</Badge>}
                {cloneSt === "error"  && <Badge>✗ {cloneError}</Badge>}
                {useManual && manualName.trim() && <Badge ok>✓ Using speaker: {manualName.trim()}</Badge>}
              </div>
            </Card>

            {/* ── STEP 02 ── */}
            <Card>
              <StepHeader num="02" title="Dubbing Script"
                right={script.trim() ? `${chunks.length} chunk${chunks.length !== 1 ? "s" : ""} · ~${estSecs}s` : "paste transcript"} />

              <textarea
                value={script} onChange={e => setScript(e.target.value)} rows={9}
                placeholder={"Paste your podcast script or transcript here.\n\nAuto-splits into XTTS-optimal chunks and merges into a single audio file.\n\nNo length limit."}
                style={{ width: "100%", background: "rgba(0,0,0,0.3)", border: `1px solid ${C.border}`, borderRadius: 10, padding: "14px 16px", color: C.textPrimary, fontSize: 12, fontFamily: C.mono, lineHeight: 1.75, resize: "vertical", outline: "none" }}
              />

              <div style={{ display: "flex", gap: 16, marginTop: 14, flexWrap: "wrap", alignItems: "flex-end" }}>
                {[
                  { label: "LANGUAGE", el: (
                    <select value={lang} onChange={e => setLang(e.target.value)} style={{ background: "rgba(0,0,0,0.35)", border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.textPrimary, fontSize: 12, fontFamily: C.mono }}>
                      {LANGS.map(([c, l]) => <option key={c} value={c}>{l} ({c})</option>)}
                    </select>
                  )},
                  { label: "CHUNK (chars)", el: <input type="number" value={maxChunk} min={80} max={400} step={10} onChange={e => setMaxChunk(Number(e.target.value))} style={{ width: 80, background: "rgba(0,0,0,0.35)", border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.textPrimary, fontSize: 12, fontFamily: C.mono }} /> },
                  { label: "SILENCE (ms)",  el: <input type="number" value={silenceMs} min={0} max={2000} step={50} onChange={e => setSilenceMs(Number(e.target.value))} style={{ width: 80, background: "rgba(0,0,0,0.35)", border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.textPrimary, fontSize: 12, fontFamily: C.mono }} /> },
                ].map(({ label, el }) => (
                  <div key={label}>
                    <div style={{ fontSize: 10, color: C.textMuted, letterSpacing: "0.15em", marginBottom: 5 }}>{label}</div>
                    {el}
                  </div>
                ))}
              </div>

              {chunks.length > 1 && (
                <div style={{ marginTop: 14, padding: "10px 14px", background: "rgba(0,0,0,0.25)", borderRadius: 8, fontSize: 10, color: C.textDim, lineHeight: 1.7, maxHeight: 100, overflowY: "auto" }}>
                  <span style={{ color: C.textMuted }}>CHUNKS PREVIEW</span><br />
                  {chunks.slice(0, 5).map((c, i) => (
                    <span key={i}>
                      <span style={{ color: C.amber }}>[{i + 1}]</span> {c.length > 70 ? c.slice(0, 67) + "…" : c}
                      {i < Math.min(chunks.length, 5) - 1 ? <br /> : null}
                    </span>
                  ))}
                  {chunks.length > 5 && <><br /><span style={{ color: C.textDim }}>…and {chunks.length - 5} more</span></>}
                </div>
              )}
            </Card>

            {/* ── STEP 03 ── */}
            <Card>
              <StepHeader num="03" title="Generate Dubbed Audio" right={activeSpeaker ? `speaker: ${activeSpeaker}` : "awaiting speaker"} />

              {!activeSpeaker && (
                <div style={{ fontSize: 11, color: C.textDim, padding: "8px 0" }}>
                  Complete step 01 — clone a speaker or enter an existing speaker name.
                </div>
              )}

              <div style={{ display: "flex", gap: 8 }}>
                <Btn onClick={generate} disabled={!canGenerate} color="green" mt={0}>
                  {genSt === "running" ? `⟳  GENERATING… (${progress.n} / ${progress.total})` : "▶  GENERATE DUBBED AUDIO"}
                </Btn>
                {genSt === "running" && (
                  <button onClick={stopGen} style={{ background: C.redDim, border: `1px solid ${C.red}44`, borderRadius: 10, padding: "0 16px", color: C.red, fontSize: 11, fontFamily: C.mono, cursor: "pointer" }}>
                    ■ STOP
                  </button>
                )}
              </div>

              {genSt === "running" && <ProgressBar n={progress.n} total={progress.total} />}

              {log.length > 0 && (
                <div style={{ marginTop: 14, maxHeight: 180, overflowY: "auto", background: "rgba(0,0,0,0.25)", borderRadius: 8, padding: "10px 14px", fontSize: 10, lineHeight: 1.9 }}>
                  {log.map((c, i) => (
                    <div key={i} style={{ color: c.st === "done" ? C.green : c.st === "error" ? C.red : C.amber }}>
                      {c.st === "done" ? "✓" : c.st === "error" ? "✗" : "·"}{" "}
                      <span style={{ opacity: 0.5 }}>[{String(c.i + 1).padStart(2, "0")}]</span> {c.text}
                    </div>
                  ))}
                </div>
              )}

              {genSt === "error" && <Badge>✗ {genError}</Badge>}
            </Card>

            {/* Output */}
            {outUrl && (
              <Card style={{ borderColor: `${C.green}44`, background: C.greenDim }}>
                <StepHeader num="✓" title="Output Audio" right={outBlob ? `${(outBlob.size / 1024).toFixed(0)} KB WAV` : ""} />
                <audio src={outUrl} controls style={{ width: "100%", borderRadius: 8 }} />
                <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                  <a href={outUrl} download="dubbed_audio.wav" style={{ display: "inline-block", background: C.amberDim, border: `1px solid ${C.amber}55`, borderRadius: 8, padding: "10px 18px", color: C.amber, fontSize: 11, textDecoration: "none", fontFamily: C.mono, letterSpacing: "0.08em" }}>
                    ↓ DOWNLOAD WAV
                  </a>
                  <button onClick={() => { setGenSt("idle"); setLog([]); setOutUrl(null); setOutBlob(null); }} style={{ background: "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 18px", color: C.textMuted, fontSize: 11, fontFamily: C.mono, cursor: "pointer", letterSpacing: "0.08em" }}>
                    ↺ NEW RUN
                  </button>
                </div>
              </Card>
            )}

            <div style={{ textAlign: "center", fontSize: 10, color: C.textDim, marginTop: 24 }}>
              LOCAL PIPELINE · COQUI XTTS v2 · DATA STAYS ON YOUR MACHINE
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
